<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ポケモン画像テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>ポケモン画像テスト</h1>
    </header>

    <main class="card" id="startScreen">
      <h2>開始設定</h2>

      <div class="field">
        <span>出題モード</span>
        <div class="segmented">
          <button type="button" class="mode-button active" data-mode="fixed">固定順</button>
          <button type="button" class="mode-button" data-mode="random">ランダム</button>
          <button type="button" class="mode-button" data-mode="review">復習</button>
        </div>
      </div>

      <div class="option-block" id="excludeSolvedBlock">
        <span class="option-title">出題オプション</span>
        <label class="check-option" for="excludeSolvedCheckbox">
          <input id="excludeSolvedCheckbox" type="checkbox">
          <span>正解済みを除外</span>
        </label>
        <small class="help-text">
          一度でも正解した問題を候補から外します。復習モードでは無効です。
        </small>
      </div>

      <label class="field">
        <span>地方</span>
        <select id="regionSelect">
          <option value="all">全地方</option>
          <option value="kanto">カントー</option>
          <option value="johto">ジョウト</option>
          <option value="hoenn">ホウエン</option>
          <option value="sinnoh">シンオウ</option>
          <option value="unova">イッシュ</option>
          <option value="kalos">カロス</option>
          <option value="alola">アローラ</option>
          <option value="galar">ガラル</option>
          <option value="hisui">ヒスイ</option>
          <option value="paldea">パルデア</option>
        </select>
      </label>

      <label class="field">
        <span>今回解く数</span>
        <input
          id="questionCountInput"
          type="number"
          inputmode="numeric"
          min="1"
          step="1"
          placeholder="候補数が自動で入ります"
        >
        <small id="questionCountHelp" class="help-text"></small>
      </label>

      <div class="quick-counts">
        <button type="button" class="quick-count-button" data-count="10">10</button>
        <button type="button" class="quick-count-button" data-count="20">20</button>
        <button type="button" class="quick-count-button" data-count="50">50</button>
        <button type="button" class="quick-count-button" data-count="all">全問</button>
      </div>

      <div class="summary-grid">
        <div class="mini-card">
          <div class="mini-label">出題候補</div>
          <div class="mini-value" id="totalQuestionCount">-</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">この条件の復習対象</div>
          <div class="mini-value" id="reviewCount">-</div>
        </div>
      </div>

      <div class="notice hidden" id="reviewNotice">
        復習モードでは、過去に誤答した問題だけが出題されます。
      </div>

      <section class="debug-panel hidden" id="debugPanel">
        <h3>デバッグ用 問題ジャンプ</h3>
        <p class="debug-text">
          問題IDを指定して、その1問だけを開きます。<br>
          このセッションの結果は復習記録に保存されません。
        </p>

        <label class="field">
          <span>問題ID</span>
          <input
            id="debugQuestionInput"
            type="text"
            list="debugQuestionList"
            autocomplete="off"
            placeholder="例: 0052-alola / 0646 / 0646-white"
          >
          <datalist id="debugQuestionList"></datalist>
          <small class="help-text" id="debugHelpText">
            `?debug=1` のときだけ表示されます。
          </small>
        </label>

        <div class="actions">
          <button id="debugStartButton" class="ghost-button">この問題を開く</button>
        </div>
      </section>

      <div class="actions">
        <button id="startButton" class="primary-button">開始する</button>
      </div>
    </main>

    <main class="card hidden" id="quizScreen">
      <div class="quiz-head">
        <div>
          <div class="status-line" id="modeLabel">固定順 / 全地方</div>
          <div class="progress" id="progressText">1 / 10</div>
        </div>
        <div class="stats">
          <span id="correctStat">正解 0</span>
          <span id="wrongStat">誤答 0</span>
        </div>
      </div>

      <div class="image-panel">
        <img id="questionImage" alt="問題画像">
      </div>

      <div id="interactionPanel">
        <div id="answerPhase">
          <label class="field">
            <span>答えを入力</span>
            <input id="answerInput" type="text" inputmode="text" autocomplete="off" placeholder="ここに入力">
          </label>

          <div class="actions quiz-actions">
            <button id="submitButton" class="primary-button">判定する</button>
            <button id="skipButton" class="ghost-button">スキップ</button>
          </div>
        </div>

        <div id="resultPhase" class="hidden">
          <div id="feedbackBox" class="feedback"></div>
          <div class="actions">
            <button id="nextButton" class="primary-button">次の問題へ</button>
          </div>
        </div>
      </div>

      <div class="session-footer">
        <button id="resetSessionBtn" class="ghost-button small">セッション終了</button>
      </div>
    </main>

    <main class="card hidden" id="resultScreen">
      <h2>結果</h2>

      <div class="summary-grid">
        <div class="mini-card">
          <div class="mini-label">正解数</div>
          <div class="mini-value" id="resultCorrect">0</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">誤答数</div>
          <div class="mini-value" id="resultWrong">0</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">今回の正答率</div>
          <div class="mini-value" id="resultRate">0%</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">この条件の復習対象残数</div>
          <div class="mini-value" id="resultReviewCount">0</div>
        </div>
      </div>

      <div id="achievementArea" class="achievement-stack hidden">
        <div id="secretAchievementBox" class="achievement-card secret hidden"></div>

        <div id="regionAchievementBox" class="achievement-card hidden">
          <div class="achievement-title">新しく達成した地方コンプリート</div>
          <ul id="completedRegionList" class="achievement-list"></ul>
        </div>
      </div>

      <div class="notice" id="resultMessage"></div>

      <div class="actions">
        <button id="retrySameModeButton" class="ghost-button">同じ条件で再挑戦</button>
        <button id="backToStartButton" class="primary-button">開始画面へ戻る</button>
      </div>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
